<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLaser | Generatore Portachiavi 3D</title>
    <link rel="icon" type="image/svg+xml" href="favicon_ML.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    
    <style>
        body { 
            background-color: #0f172a; 
            position: relative;
            scroll-behavior: smooth;
            padding-bottom: 40px;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 L40 25 L40 40 L20 40 L20 25 Z M28 40 L32 40 L30 45 Z' fill='none' stroke='%23ffffff' stroke-width='1'/%3E%3C/svg%3E");
            background-repeat: repeat;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }
        .brand-red { color: #ef4444; }
        
        /* Stili Generatore */
        .tool-ui { background: #161b22; border-left: 1px solid #30363d; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .sw { height: 20px; border-radius: 4px; cursor: pointer; border: 1px solid #444; transition: 0.2s; }
        .sw.active { border: 2px solid #fff; outline: 1px solid #00e5ff; transform: scale(1.1); }
        input[type="range"] { accent-color: #00e5ff; cursor: pointer; width: 100%; }
        select, input[type="text"] { background: #000; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; outline: none; }
        select:focus, input[type="text"]:focus { border-color: #00e5ff; }
    </style>
</head>
<body class="text-gray-100 font-sans leading-relaxed">

    <nav class="flex justify-between items-center p-4 bg-[#1e293b]/90 backdrop-blur-md border-b border-white/5 sticky top-0 z-50">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='index.html'">
            <img src="logo.svg" alt="Logo" class="h-5 w-auto" style="filter: brightness(0) invert(1);">
            <div class="text-2xl font-black tracking-tighter">
                <span class="brand-red">ML</span><span class="text-white">aser</span>
            </div>
        </div>
        <div class="flex items-center gap-5 md:gap-8 font-bold uppercase text-[11px] md:text-sm tracking-tighter text-gray-400">
            <a href="stampa3d.html" class="hover:text-white transition">3D</a>
            <a href="laser.html" class="hover:text-white transition">Laser</a>
            <a href="bio.html" class="hover:text-white transition">Bio</a>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-6 py-6">
        <a href="tools.html" class="inline-flex items-center gap-2 text-xs font-bold text-gray-400 hover:text-white transition-colors mb-6 group">
            <span class="group-hover:-translate-x-1 transition-transform">←</span> TORNA AI TOOLS
        </a>

        <header class="mb-8">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Configuratore 3D <span class="text-cyan-400">Portachiavi</span></h1>
        </header>

        <div class="bg-[#0d1117] rounded-2xl border border-white/10 overflow-hidden flex flex-col md:flex-row h-[700px] shadow-2xl">
            
            <div id="canvas-target" class="flex-1 relative">
                <div class="absolute top-4 left-4 text-[10px] text-cyan-400/40 font-mono pointer-events-none uppercase tracking-widest">Workspace: 200x200mm</div>
            </div>

            <div class="w-full md:w-[350px] tool-ui p-6 flex flex-col gap-5 overflow-y-auto">
                
                <div>
                    <label class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-2 block">Testo (Max 12)</label>
                    <input type="text" id="in-txt" value="CHARLIE" maxlength="12" class="w-full text-cyan-400 font-bold">
                </div>

                <div>
                    <label class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-2 block">Stile Carattere</label>
                    <select id="font-select" class="w-full text-sm">
                        <option value="helvetiker_bold">Impact Bold</option>
                        <option value="helvetiker_regular">Modern Sans</option>
                        <option value="gentilis_bold">Tech Square</option>
                        <option value="optimer_bold">Sharp Geometric</option>
                        <option value="droid/droid_serif_bold">Classic Serif</option>
                    </select>
                </div>

                <div>
                    <label class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-2 block">Colore Base (Matte)</label>
                    <div id="p-base" class="color-grid"></div>
                </div>

                <div>
                    <label class="text-[10px] font-bold opacity-40 uppercase tracking-widest mb-2 block">Colore Testo (Matte)</label>
                    <div id="p-txt" class="color-grid"></div>
                </div>

                <div class="bg-black/40 p-4 rounded-xl border border-white/5 space-y-4">
                    <div>
                        <div class="flex justify-between text-[10px] mb-1 uppercase font-bold"><span>Bordo</span><span id="v-off" class="text-cyan-400">4</span></div>
                        <input type="range" id="in-off" min="2" max="10" step="0.5" value="4">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] mb-1 uppercase font-bold"><span>Base</span><span id="v-bh" class="text-cyan-400">3</span></div>
                        <input type="range" id="in-bh" min="1" max="8" step="0.5" value="3">
                    </div>
                    <div>
                        <div class="flex justify-between text-[10px] mb-1 uppercase font-bold"><span>Testo</span><span id="v-th" class="text-cyan-400">2</span></div>
                        <input type="range" id="in-th" min="0.4" max="5" step="0.2" value="2">
                    </div>
                </div>

                <button id="btn-export" class="mt-auto w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-4 rounded-xl uppercase text-xs tracking-widest transition-all shadow-lg active:scale-95">
                    SCARICA STL PER SLICER
                </button>
            </div>
        </div>
    </div>

    <script>
    (function() {
        let scene, camera, renderer, controls, group, font;
        const conf = { txt: "CHARLIE", off: 4, bh: 3, th: 2, cT: "#ffffff", cB: "#00008b" };
        const colors = ["#00008b", "#e30613", "#ffffff", "#000000", "#238636", "#ffea00", "#00e5ff", "#d500f9", "#ff6d00", "#795548", "#9e9e9e", "#ff80ab", "#1a237e", "#ffd600", "#b71c1c"];

        function init() {
            const target = document.getElementById('canvas-target');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, target.clientWidth/target.clientHeight, 1, 1000);
            camera.position.set(0, -110, 140);
            renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
            renderer.setSize(target.clientWidth, target.clientHeight);
            target.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            
            const grid = new THREE.GridHelper(200, 20, 0x444444, 0x222222);
            grid.rotation.x = Math.PI/2;
            scene.add(grid);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            
            group = new THREE.Group();
            scene.add(group);

            const setupP = (id, k) => {
                const container = document.getElementById(id);
                colors.forEach(col => {
                    const d = document.createElement('div');
                    d.className = 'sw' + (col===conf[k]?' active':'');
                    d.style.background = col;
                    d.onclick = () => {
                        container.querySelector('.active').classList.remove('active');
                        d.classList.add('active');
                        conf[k] = col; update();
                    };
                    container.appendChild(d);
                });
            };
            setupP('p-base', 'cB'); setupP('p-txt', 'cT');
            load(document.getElementById('font-select').value);
            loop();
        }

        function load(n) {
            new THREE.FontLoader().load(`https://threejs.org/examples/fonts/${n}.typeface.json`, f => { font = f; update(); });
        }

        function update() {
            if(!font) return;
            while(group.children.length > 0) group.remove(group.children[0]);
            
            const tGeo = new THREE.TextGeometry(conf.txt, { font: font, size: 20, height: conf.th });
            tGeo.computeBoundingBox();
            const s = new THREE.Vector3(); tGeo.boundingBox.getSize(s);
            const c = new THREE.Vector3(); tGeo.boundingBox.getCenter(c);
            
            const tM = new THREE.Mesh(tGeo, new THREE.MeshLambertMaterial({color: conf.cT}));
            tM.position.set(-c.x, -c.y, conf.bh);
            group.add(tM);

            const bw = s.x + (conf.off*2), bh = s.y + (conf.off*2), r = conf.off/1.2;
            const sh = new THREE.Shape();
            sh.moveTo(-bw/2+r, -bh/2); sh.lineTo(bw/2-r, -bh/2); sh.absarc(bw/2-r, -bh/2+r, r, Math.PI*1.5, 0, false);
            sh.lineTo(bw/2, bh/2-r); sh.absarc(bw/2-r, bh/2-r, r, 0, Math.PI*0.5, false);
            sh.lineTo(-bw/2+r, bh/2); sh.absarc(-bw/2+r, bh/2-r, r, Math.PI*0.5, Math.PI, false);
            sh.lineTo(-bw/2, -bh/2+r); sh.absarc(-bw/2+r, -bh/2+r, r, Math.PI, Math.PI*1.5, false);
            
            const bM = new THREE.Mesh(new THREE.ExtrudeGeometry(sh, {depth: conf.bh, bevelEnabled:false}), new THREE.MeshLambertMaterial({color: conf.cB}));
            group.add(bM);

            const rs = new THREE.Shape(); rs.absarc(0,0,7,0,Math.PI*2);
            const rh = new THREE.Path(); rh.absarc(0,0,3.5,0,Math.PI*2,true); rs.holes.push(rh);
            const rM = new THREE.Mesh(new THREE.ExtrudeGeometry(rs, {depth: conf.bh, bevelEnabled:false}), new THREE.MeshLambertMaterial({color: conf.cB}));
            rM.position.set(-bw/2, 0, 0);
            group.add(rM);
        }

        document.getElementById('in-txt').oninput = e => { conf.txt = e.target.value.toUpperCase() || " "; update(); };
        document.getElementById('font-select').onchange = e => load(e.target.value);
        document.getElementById('in-off').oninput = e => { conf.off = parseFloat(e.target.value); document.getElementById('v-off').innerText=conf.off; update(); };
        document.getElementById('in-bh').oninput = e => { conf.bh = parseFloat(e.target.value); document.getElementById('v-bh').innerText=conf.bh; update(); };
        document.getElementById('in-th').oninput = e => { conf.th = parseFloat(e.target.value); document.getElementById('v-th').innerText=conf.th; update(); };

        document.getElementById('btn-export').onclick = () => {
            const exporter = new THREE.STLExporter();
            const result = exporter.parse(group, { binary: true }); 
            const blob = new Blob([result], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = conf.txt + "_Keychain.stl";
            a.click();
        };

        function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); }
        init();
    })();
    </script>
</body>
</html>
